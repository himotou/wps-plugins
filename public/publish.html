<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPS 插件安装</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f6fb;
        color: #1f2937;
      }

      .page {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px 60px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 10px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
        overflow: hidden;
      }

      .header {
        padding: 24px 28px 18px;
        background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
        color: #ffffff;
      }

      .header h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .header p {
        margin: 0;
        font-size: 14px;
        line-height: 1.6;
        opacity: 0.95;
      }

      .content {
        padding: 24px 28px 28px;
      }

      .grid {
        display: grid;
        gap: 14px;
        margin-bottom: 24px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 13px;
        font-weight: 700;
        color: #334155;
      }

      .value {
        padding: 12px 14px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #f8fbff;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-all;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 8px;
        padding: 11px 18px;
        font-size: 14px;
        cursor: pointer;
      }

      .primary {
        background: #2563eb;
        color: #ffffff;
      }

      .secondary {
        background: #e5e7eb;
        color: #111827;
      }

      .ghost {
        background: #eef2ff;
        color: #3730a3;
      }

      .status {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 8px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 14px;
        line-height: 1.6;
      }

      .status.error {
        background: #fef2f2;
        color: #b91c1c;
      }

      .steps {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #e5e7eb;
        font-size: 14px;
        line-height: 1.7;
        color: #475569;
      }

      .steps strong {
        color: #0f172a;
      }

      .notice {
        margin-bottom: 20px;
        padding: 14px 16px;
        border: 1px solid #bfdbfe;
        border-radius: 8px;
        background: #eff6ff;
        color: #1e40af;
        font-size: 14px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel">
        <div class="header">
          <h1>WPS 插件安装</h1>
          <p>打开本页后点击“安装/更新”，浏览器会调用本机 WPS 的加载项服务，把当前站点上的插件安装到 WPS 演示。</p>
        </div>
        <div class="content">
          <div class="notice">
            WPS 里的“加载项管理”页面本身没有手动输入 URL 的输入框，这是正常的。线上安装请直接在浏览器打开当前页面，然后点击“安装 / 更新”。
          </div>

          <div class="grid">
            <div class="field">
              <label>插件名称</label>
              <div class="value" id="pluginName">link-bind</div>
            </div>
            <div class="field">
              <label>插件根地址</label>
              <div class="value" id="pluginRoot"></div>
            </div>
            <div class="field">
              <label>ribbon.xml 地址</label>
              <div class="value" id="pluginRibbon"></div>
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="installButton">安装 / 更新</button>
            <button class="secondary" id="removeButton">卸载</button>
            <button class="ghost" id="checkButton">检测本机服务</button>
          </div>

          <div class="status" id="statusBox">准备就绪。</div>

          <div class="steps">
            <div><strong>使用方法</strong></div>
            <div>1. 先关闭 WPS 里的旧版本地调试插件，或直接点本页“安装 / 更新”。</div>
            <div>2. 如果浏览器提示打开 WPS，请允许。</div>
            <div>3. 安装完成后回到 WPS 演示，功能区里应出现“链接绑定”。</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const pluginRoot = new URL('./', window.location.href).toString();
      const ribbonUrl = new URL('ribbon.xml', pluginRoot).toString();
      const serverId = getServerId();
      const addon = {
        name: 'link-bind',
        addonType: 'wpp',
        online: 'true',
        version: '1.0.0',
        customDomain: '',
        url: pluginRoot
      };

      let serverVersion = 'wait';

      document.getElementById('pluginRoot').textContent = pluginRoot;
      document.getElementById('pluginRibbon').textContent = ribbonUrl;
      document.getElementById('installButton').addEventListener('click', () => installAddon('enable'));
      document.getElementById('removeButton').addEventListener('click', () => installAddon('disable'));
      document.getElementById('checkButton').addEventListener('click', checkLocalService);

      function getServerId() {
        const key = 'wps_plugin_server_id';
        const existing = window.localStorage.getItem(key);
        if (existing) {
          return existing;
        }

        const nextId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(char) {
          const rand = Math.random() * 16 | 0;
          const value = char === 'x' ? rand : (rand & 0x3 | 0x8);
          return value.toString(16);
        });

        window.localStorage.setItem(key, nextId);
        return nextId;
      }

      function encodeBase64(value) {
        return window.btoa(unescape(encodeURIComponent(value)));
      }

      function setStatus(message, isError) {
        const statusBox = document.getElementById('statusBox');
        statusBox.textContent = message;
        statusBox.className = isError ? 'status error' : 'status';
      }

      function startRelayService() {
        window.location.href = `ksoWPSCloudSvr://start=RelayHttpServer&serverId=${serverId}`;
      }

      function createRequest() {
        return new XMLHttpRequest();
      }

      function postLocal(url, body, onSuccess, onError, retryCount) {
        const request = createRequest();
        request.open('POST', url);
        request.timeout = 3000;

        request.onload = function() {
          if (request.status >= 200 && request.status < 300) {
            onSuccess(request.responseText);
            return;
          }

          if (retryCount > 0) {
            startRelayService();
            setTimeout(function() {
              postLocal(url, body, onSuccess, onError, retryCount - 1);
            }, 1200);
            return;
          }

          onError(new Error(`请求失败: ${request.status}`));
        };

        request.onerror = request.ontimeout = function() {
          if (retryCount > 0) {
            startRelayService();
            setTimeout(function() {
              postLocal(url, body, onSuccess, onError, retryCount - 1);
            }, 1200);
            return;
          }

          onError(new Error('本机 WPS 加载项服务未响应'));
        };

        request.send(body);
      }

      function buildPayload(data) {
        const raw = JSON.stringify(data);

        if (serverVersion !== 'wait' && serverVersion >= '1.0.2') {
          return JSON.stringify({
            serverId: serverId,
            data: encodeBase64(raw)
          });
        }

        return encodeBase64(raw);
      }

      function readVersion() {
        return new Promise(function(resolve, reject) {
          postLocal(
            'http://127.0.0.1:58890/version',
            JSON.stringify({ serverId: serverId }),
            function(response) {
              serverVersion = response || '1.0.0';
              resolve(serverVersion);
            },
            reject,
            2
          );
        });
      }

      function checkLocalService() {
        setStatus('正在检测本机 WPS 加载项服务...');

        readVersion()
          .then(function(version) {
            setStatus(`检测成功，本机服务版本：${version}`);
          })
          .catch(function(error) {
            setStatus(`检测失败：${error.message}`, true);
          });
      }

      function installAddon(cmd) {
        const actionLabel = cmd === 'enable' ? '安装' : '卸载';
        setStatus(`正在${actionLabel}插件...`);

        readVersion()
          .then(function() {
            return new Promise(function(resolve, reject) {
              const payload = buildPayload({
                cmd: cmd,
                name: addon.name,
                url: addon.url,
                addonType: addon.addonType,
                online: addon.online,
                version: addon.version,
                customDomain: addon.customDomain
              });

              postLocal(
                'http://127.0.0.1:58890/deployaddons/runParams',
                payload,
                function(response) {
                  resolve(response);
                },
                reject,
                1
              );
            });
          })
          .then(function(response) {
            if (response === 'OK' || response === '') {
              setStatus(`${actionLabel}成功。请回到 WPS 查看“链接绑定”功能区按钮。`);
              return;
            }

            setStatus(`${actionLabel}返回结果：${response}`, false);
          })
          .catch(function(error) {
            setStatus(`${actionLabel}失败：${error.message}`, true);
          });
      }
    </script>
  </body>
</html>
